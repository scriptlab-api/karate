name: API Automation Tests

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:

  run-api-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build and Run Tests
        run: mvn clean test